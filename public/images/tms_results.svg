<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <defs>
    <linearGradient id="rBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAFBFF"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>
  <rect width="480" height="360" rx="24" fill="url(#rBg)"/>

  <!-- Main chart card -->
  <rect x="30" y="30" width="280" height="210" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Chart title -->
  <text x="50" y="58" font-family="Plus Jakarta Sans, sans-serif" font-size="11" font-weight="700" fill="#0F172A">Depression Score Over Treatment</text>
  <text x="50" y="72" font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#94A3B8">PHQ-9 Score by Week</text>

  <!-- Y-axis labels -->
  <text x="42" y="102" text-anchor="end" font-family="Plus Jakarta Sans, sans-serif" font-size="8" fill="#94A3B8">20</text>
  <text x="42" y="132" text-anchor="end" font-family="Plus Jakarta Sans, sans-serif" font-size="8" fill="#94A3B8">15</text>
  <text x="42" y="162" text-anchor="end" font-family="Plus Jakarta Sans, sans-serif" font-size="8" fill="#94A3B8">10</text>
  <text x="42" y="192" text-anchor="end" font-family="Plus Jakarta Sans, sans-serif" font-size="8" fill="#94A3B8">5</text>
  <text x="42" y="222" text-anchor="end" font-family="Plus Jakarta Sans, sans-serif" font-size="8" fill="#94A3B8">0</text>

  <!-- Grid lines -->
  <g stroke="#F1F5F9" stroke-width="1">
    <line x1="50" y1="98" x2="295" y2="98"/>
    <line x1="50" y1="128" x2="295" y2="128"/>
    <line x1="50" y1="158" x2="295" y2="158"/>
    <line x1="50" y1="188" x2="295" y2="188"/>
    <line x1="50" y1="218" x2="295" y2="218"/>
  </g>

  <!-- Remission threshold zone -->
  <rect x="50" y="188" width="245" height="30" rx="0" fill="#10B981" opacity="0.06"/>
  <text x="255" y="210" font-family="Plus Jakarta Sans, sans-serif" font-size="7" font-weight="600" fill="#10B981">REMISSION</text>

  <!-- Improvement line (descending = getting better) -->
  <polyline points="65,102 100,108 135,118 170,132 205,158 240,182 275,202"
    stroke="url(#lineGrad)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data points -->
  <circle cx="65" cy="102" r="4" fill="white" stroke="#7C3AED" stroke-width="2"/>
  <circle cx="100" cy="108" r="4" fill="white" stroke="#7C3AED" stroke-width="2"/>
  <circle cx="135" cy="118" r="4" fill="white" stroke="#7C3AED" stroke-width="2"/>
  <circle cx="170" cy="132" r="4" fill="white" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="205" cy="158" r="4" fill="white" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="240" cy="182" r="4" fill="white" stroke="#10B981" stroke-width="2"/>
  <circle cx="275" cy="202" r="5" fill="#10B981" stroke="white" stroke-width="2"/>

  <!-- X-axis labels -->
  <text x="65" y="232" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="8" fill="#94A3B8">Wk 1</text>
  <text x="135" y="232" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="8" fill="#94A3B8">Wk 3</text>
  <text x="205" y="232" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="8" fill="#94A3B8">Wk 5</text>
  <text x="275" y="232" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="8" font-weight="700" fill="#10B981">Wk 7</text>

  <!-- Annotation arrow to last point -->
  <g transform="translate(275, 195)">
    <rect x="8" y="-18" width="55" height="20" rx="6" fill="#10B981"/>
    <text x="35" y="-4" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="8" font-weight="700" fill="white">Remission!</text>
  </g>

  <!-- Stats cards (right column) -->
  <!-- Response rate -->
  <g transform="translate(330, 30)">
    <rect x="0" y="0" width="120" height="70" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="15" y="22" font-family="Plus Jakarta Sans, sans-serif" font-size="8" font-weight="600" fill="#94A3B8" letter-spacing="0.05em">RESPONSE RATE</text>
    <text x="15" y="48" font-family="Bricolage Grotesque, sans-serif" font-size="28" font-weight="800" fill="#7C3AED">83%</text>
    <text x="68" y="48" font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#10B981" font-weight="600">+12%</text>
    <rect x="15" y="55" width="90" height="4" rx="2" fill="#EDE9FE"/>
    <rect x="15" y="55" width="75" height="4" rx="2" fill="#7C3AED"/>
  </g>

  <!-- Remission rate -->
  <g transform="translate(330, 112)">
    <rect x="0" y="0" width="120" height="70" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="15" y="22" font-family="Plus Jakarta Sans, sans-serif" font-size="8" font-weight="600" fill="#94A3B8" letter-spacing="0.05em">REMISSION RATE</text>
    <text x="15" y="48" font-family="Bricolage Grotesque, sans-serif" font-size="28" font-weight="800" fill="#10B981">62%</text>
    <rect x="15" y="55" width="90" height="4" rx="2" fill="#ECFDF5"/>
    <rect x="15" y="55" width="56" height="4" rx="2" fill="#10B981"/>
  </g>

  <!-- Sessions completed -->
  <g transform="translate(330, 194)">
    <rect x="0" y="0" width="120" height="50" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="15" y="20" font-family="Plus Jakarta Sans, sans-serif" font-size="8" font-weight="600" fill="#94A3B8" letter-spacing="0.05em">AVG SESSIONS</text>
    <text x="15" y="40" font-family="Bricolage Grotesque, sans-serif" font-size="22" font-weight="800" fill="#0F172A">36</text>
    <text x="45" y="40" font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#64748B">sessions</text>
  </g>

  <!-- Bottom patient satisfaction bar -->
  <g transform="translate(30, 260)">
    <rect x="0" y="0" width="420" height="75" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="20" y="22" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="700" fill="#0F172A">Patient Satisfaction</text>

    <!-- Satisfaction faces -->
    <g transform="translate(20, 35)">
      <!-- Very satisfied -->
      <rect x="0" y="0" width="90" height="28" rx="8" fill="#ECFDF5"/>
      <text x="10" y="19" font-family="Plus Jakarta Sans, sans-serif" font-size="14">&#128522;</text>
      <text x="30" y="19" font-family="Plus Jakarta Sans, sans-serif" font-size="9" font-weight="700" fill="#065F46">78% Great</text>

      <!-- Satisfied -->
      <rect x="100" y="0" width="85" height="28" rx="8" fill="#EDE9FE"/>
      <text x="110" y="19" font-family="Plus Jakarta Sans, sans-serif" font-size="14">&#128578;</text>
      <text x="130" y="19" font-family="Plus Jakarta Sans, sans-serif" font-size="9" font-weight="700" fill="#6D28D9">16% Good</text>

      <!-- Neutral -->
      <rect x="195" y="0" width="80" height="28" rx="8" fill="#F1F5F9"/>
      <text x="205" y="19" font-family="Plus Jakarta Sans, sans-serif" font-size="14">&#128528;</text>
      <text x="225" y="19" font-family="Plus Jakarta Sans, sans-serif" font-size="9" font-weight="600" fill="#64748B">6% Okay</text>
    </g>

    <!-- Star rating -->
    <g transform="translate(330, 32)">
      <text x="0" y="15" font-family="Plus Jakarta Sans, sans-serif" font-size="22" font-weight="800" fill="#0F172A">4.8</text>
      <text x="38" y="10" font-family="Plus Jakarta Sans, sans-serif" font-size="10" fill="#F59E0B">&#9733;&#9733;&#9733;&#9733;&#9733;</text>
      <text x="38" y="24" font-family="Plus Jakarta Sans, sans-serif" font-size="8" fill="#94A3B8">avg rating</text>
    </g>
  </g>
</svg>
