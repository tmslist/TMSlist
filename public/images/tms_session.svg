<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <defs>
    <linearGradient id="sBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAFBFF"/>
      <stop offset="100%" stop-color="#F0EAFF"/>
    </linearGradient>
    <style>
      @keyframes sPulse { 0%,100%{opacity:0.2;r:6} 50%{opacity:0.6;r:10} }
      @keyframes sWave { 0%,100%{opacity:0.3} 50%{opacity:0.7} }
      .s-pulse { animation: sPulse 2s ease-in-out infinite; }
      .s-pulse2 { animation: sPulse 2s ease-in-out infinite 0.7s; }
      .s-wave { animation: sWave 1.5s ease-in-out infinite; }
      .s-wave2 { animation: sWave 1.5s ease-in-out infinite 0.5s; }
    </style>
  </defs>
  <rect width="480" height="360" rx="24" fill="url(#sBg)"/>

  <!-- Treatment room ambient -->
  <rect x="30" y="30" width="420" height="250" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1"/>

  <!-- TMS Treatment Chair (reclined) -->
  <path d="M100 260 C100 240 110 210 140 200 L320 200 C340 200 355 215 355 235 L355 265 C355 275 348 280 340 280 L110 280 C104 280 100 275 100 268Z" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <!-- Chair cushion -->
  <path d="M115 260 C115 245 125 220 150 212 L310 212 C325 212 340 222 340 238 L340 260 C340 268 335 272 328 272 L125 272 C119 272 115 268 115 262Z" fill="#EDE9FE" stroke="#DDD6FE" stroke-width="1"/>
  <!-- Headrest -->
  <ellipse cx="145" cy="210" rx="35" ry="18" fill="#DDD6FE" stroke="#C4B5FD" stroke-width="1.5"/>

  <!-- Patient (lying back) -->
  <!-- Head on headrest -->
  <circle cx="150" cy="195" r="22" fill="#FDE8D8"/>
  <!-- Hair -->
  <path d="M132 185c3-10 15-15 26-12 6 2 10 6 11 11" fill="#7C2D12"/>
  <!-- Eyes (closed, relaxed) -->
  <path d="M140 196c3-2 6-2 9 0" stroke="#475569" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M155 196c3-2 6-2 9 0" stroke="#475569" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Relaxed mouth -->
  <path d="M146 204c2 1.5 6 1.5 8 0" stroke="#94A3B8" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Body -->
  <path d="M140 218 L300 230 L300 255 L140 250Z" fill="#93C5FD" opacity="0.7"/>

  <!-- TMS DEVICE ARM (overhead, mechanical) -->
  <!-- Vertical post -->
  <rect x="86" y="60" width="12" height="110" rx="4" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="1.5"/>
  <!-- Base clamp -->
  <rect x="78" y="55" width="28" height="15" rx="4" fill="#CBD5E1" stroke="#94A3B8" stroke-width="1"/>
  <!-- Articulating arm -->
  <path d="M98 80 C110 80 125 85 135 100 C145 115 148 130 150 145" stroke="#94A3B8" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Arm joints -->
  <circle cx="98" cy="80" r="6" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5"/>
  <circle cx="135" cy="100" r="5" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5"/>

  <!-- FIGURE-8 COIL (positioned on patient's head) -->
  <g transform="translate(148, 168) rotate(-10)">
    <!-- Coil wings -->
    <ellipse cx="-18" cy="0" rx="20" ry="14" fill="#F8FAFC" stroke="#94A3B8" stroke-width="2"/>
    <ellipse cx="18" cy="0" rx="20" ry="14" fill="#F8FAFC" stroke="#94A3B8" stroke-width="2"/>
    <!-- Center -->
    <rect x="-7" y="-10" width="14" height="20" rx="3" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5"/>
    <!-- Windings -->
    <ellipse cx="-18" cy="0" rx="14" ry="9" fill="none" stroke="#7C3AED" stroke-width="1.5" opacity="0.3"/>
    <ellipse cx="18" cy="0" rx="14" ry="9" fill="none" stroke="#7C3AED" stroke-width="1.5" opacity="0.3"/>
    <!-- Active light -->
    <circle cx="0" cy="0" r="3" fill="#7C3AED"/>
    <circle cx="0" cy="0" r="1.5" fill="#A78BFA"/>
  </g>

  <!-- Magnetic pulse visualization -->
  <circle cx="148" cy="188" r="6" fill="none" stroke="#7C3AED" stroke-width="1.5" class="s-pulse"/>
  <circle cx="148" cy="188" r="6" fill="none" stroke="#8B5CF6" stroke-width="1" class="s-pulse2"/>

  <!-- Pulse wave lines into brain -->
  <g opacity="0.5">
    <path d="M148 175 L148 195" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="3 2" class="s-wave"/>
    <path d="M140 177 L138 193" stroke="#A78BFA" stroke-width="1" stroke-dasharray="3 2" class="s-wave2"/>
    <path d="M156 177 L158 193" stroke="#A78BFA" stroke-width="1" stroke-dasharray="3 2" class="s-wave2"/>
  </g>

  <!-- Control console (right side) -->
  <rect x="360" y="100" width="80" height="130" rx="8" fill="white" stroke="#CBD5E1" stroke-width="1.5"/>
  <!-- Screen -->
  <rect x="368" y="108" width="64" height="45" rx="4" fill="#0F172A"/>
  <!-- Waveform on screen -->
  <polyline points="374,135 380,125 386,138 392,118 398,140 404,122 410,132 416,128 422,135" stroke="#7C3AED" stroke-width="1.5" fill="none"/>
  <polyline points="374,140 380,136 386,142 392,134 398,143 404,137 410,139 416,136 422,140" stroke="#06B6D4" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- Buttons -->
  <circle cx="382" cy="168" r="6" fill="#10B981"/>
  <circle cx="400" cy="168" r="6" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="1"/>
  <circle cx="418" cy="168" r="6" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="1"/>
  <!-- Intensity slider -->
  <rect x="374" y="185" width="52" height="4" rx="2" fill="#E2E8F0"/>
  <rect x="374" y="185" width="35" height="4" rx="2" fill="#7C3AED"/>
  <circle cx="409" cy="187" r="5" fill="white" stroke="#7C3AED" stroke-width="1.5"/>
  <!-- Label -->
  <text x="374" y="210" font-family="Plus Jakarta Sans, sans-serif" font-size="7" font-weight="600" fill="#94A3B8">INTENSITY</text>
  <text x="374" y="222" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="700" fill="#0F172A">120% MT</text>

  <!-- Timer badge -->
  <g transform="translate(335, 40)">
    <rect x="0" y="0" width="110" height="35" rx="18" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <circle cx="20" cy="17" r="9" fill="#EDE9FE"/>
    <text x="20" y="21" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="9" font-weight="700" fill="#7C3AED">19</text>
    <text x="38" y="15" font-family="Plus Jakarta Sans, sans-serif" font-size="8" font-weight="600" fill="#64748B">min remaining</text>
    <text x="38" y="26" font-family="Plus Jakarta Sans, sans-serif" font-size="8" font-weight="500" fill="#94A3B8">Session 12/36</text>
  </g>

  <!-- Comfort badge -->
  <g transform="translate(30, 300)">
    <rect x="0" y="0" width="160" height="32" rx="16" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
    <text x="15" y="21" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="600" fill="#065F46">No anesthesia needed</text>
  </g>

  <!-- Non-invasive badge -->
  <g transform="translate(210, 300)">
    <rect x="0" y="0" width="150" height="32" rx="16" fill="#EDE9FE" stroke="#DDD6FE" stroke-width="1"/>
    <text x="15" y="21" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="600" fill="#6D28D9">Return to work same day</text>
  </g>
</svg>
