<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <defs>
    <linearGradient id="dBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#FAFBFF"/>
    </linearGradient>
    <radialGradient id="fieldR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <style>
      @keyframes dPulse { 0%,100%{r:30;opacity:0.3} 50%{r:50;opacity:0} }
      .d-pulse { animation: dPulse 2s ease-out infinite; }
      .d-pulse2 { animation: dPulse 2s ease-out infinite 0.7s; }
    </style>
  </defs>
  <rect width="480" height="360" rx="24" fill="url(#dBg)"/>

  <!-- Scalp/head surface (curved) -->
  <path d="M0 240 C80 200 200 180 320 190 C400 196 460 210 480 225 L480 360 L0 360Z" fill="#FDE8D8" opacity="0.3"/>
  <path d="M0 240 C80 200 200 180 320 190 C400 196 460 210 480 225" stroke="#E2C5A8" stroke-width="2" fill="none"/>

  <!-- Hair strands (subtle) -->
  <g stroke="#B45309" stroke-width="0.8" opacity="0.2">
    <path d="M50 235 C55 220 60 215 55 200"/>
    <path d="M80 225 C85 210 88 205 83 190"/>
    <path d="M420 215 C425 200 428 195 423 180"/>
    <path d="M450 220 C455 205 458 200 453 185"/>
  </g>

  <!-- LARGE FIGURE-8 COIL (detailed, exploded view) -->
  <g transform="translate(240, 160)">
    <!-- Shadow -->
    <ellipse cx="0" cy="50" rx="100" ry="15" fill="#000" opacity="0.03"/>

    <!-- Left coil wing -->
    <ellipse cx="-65" cy="0" rx="70" ry="48" fill="white" stroke="#94A3B8" stroke-width="2.5"/>
    <!-- Left coil winding layers -->
    <ellipse cx="-65" cy="0" rx="55" ry="36" fill="none" stroke="#7C3AED" stroke-width="2" opacity="0.25"/>
    <ellipse cx="-65" cy="0" rx="42" ry="27" fill="none" stroke="#7C3AED" stroke-width="1.5" opacity="0.18"/>
    <ellipse cx="-65" cy="0" rx="30" ry="19" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.12"/>
    <!-- Current direction arrow -->
    <path d="M-30 -30 C-15 -40 -5 -35 -5 -20" stroke="#6D28D9" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

    <!-- Right coil wing -->
    <ellipse cx="65" cy="0" rx="70" ry="48" fill="white" stroke="#94A3B8" stroke-width="2.5"/>
    <!-- Right coil winding layers -->
    <ellipse cx="65" cy="0" rx="55" ry="36" fill="none" stroke="#7C3AED" stroke-width="2" opacity="0.25"/>
    <ellipse cx="65" cy="0" rx="42" ry="27" fill="none" stroke="#7C3AED" stroke-width="1.5" opacity="0.18"/>
    <ellipse cx="65" cy="0" rx="30" ry="19" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.12"/>

    <!-- Center junction housing -->
    <rect x="-22" y="-35" width="44" height="70" rx="10" fill="#F1F5F9" stroke="#94A3B8" stroke-width="2"/>
    <!-- Junction detail -->
    <rect x="-15" y="-28" width="30" height="56" rx="6" fill="#E2E8F0"/>

    <!-- Active center indicator -->
    <circle cx="0" cy="0" r="8" fill="#7C3AED" opacity="0.9"/>
    <circle cx="0" cy="0" r="4" fill="#A78BFA"/>
    <circle cx="0" cy="0" r="2" fill="white" opacity="0.8"/>

    <!-- Magnetic field emanating from center -->
    <circle cx="0" cy="40" r="30" fill="none" stroke="#7C3AED" stroke-width="1.5" class="d-pulse"/>
    <circle cx="0" cy="40" r="30" fill="none" stroke="#8B5CF6" stroke-width="1" class="d-pulse2"/>
    <ellipse cx="0" cy="55" rx="40" ry="35" fill="url(#fieldR)"/>

    <!-- Field direction arrows -->
    <g stroke="#7C3AED" stroke-width="1.2" opacity="0.4" stroke-dasharray="4 3">
      <path d="M0 15 L0 80"/>
      <path d="M-15 18 L-20 75"/>
      <path d="M15 18 L20 75"/>
    </g>
    <g fill="#7C3AED" opacity="0.4">
      <polygon points="0,80 -4,72 4,72"/>
      <polygon points="-20,75 -24,67 -16,67"/>
      <polygon points="20,75 16,67 24,67"/>
    </g>

    <!-- Handle -->
    <rect x="-10" y="-80" width="20" height="50" rx="6" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5"/>
    <!-- Cable connection -->
    <circle cx="0" cy="-80" r="8" fill="#CBD5E1" stroke="#94A3B8" stroke-width="1.5"/>
    <circle cx="0" cy="-80" r="3" fill="#94A3B8"/>
  </g>

  <!-- Annotation labels -->
  <!-- Left coil label -->
  <g transform="translate(40, 50)">
    <rect x="0" y="0" width="100" height="24" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <text x="50" y="16" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="9" font-weight="600" fill="#6D28D9">Left Coil Wing</text>
  </g>
  <line x1="90" y1="74" x2="145" y2="135" stroke="#7C3AED" stroke-width="1" opacity="0.3" stroke-dasharray="3 3"/>

  <!-- Right coil label -->
  <g transform="translate(340, 50)">
    <rect x="0" y="0" width="105" height="24" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <text x="52" y="16" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="9" font-weight="600" fill="#6D28D9">Right Coil Wing</text>
  </g>
  <line x1="392" y1="74" x2="335" y2="135" stroke="#7C3AED" stroke-width="1" opacity="0.3" stroke-dasharray="3 3"/>

  <!-- Center label -->
  <g transform="translate(185, 70)">
    <rect x="0" y="0" width="110" height="24" rx="12" fill="#7C3AED" opacity="0.1"/>
    <text x="55" y="16" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="9" font-weight="700" fill="#6D28D9">Focal Point</text>
  </g>
  <line x1="240" y1="94" x2="240" y2="148" stroke="#7C3AED" stroke-width="1" opacity="0.4" stroke-dasharray="3 3"/>

  <!-- Field depth label -->
  <g transform="translate(340, 285)">
    <rect x="0" y="0" width="120" height="45" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="15" y="18" font-family="Plus Jakarta Sans, sans-serif" font-size="8" font-weight="600" fill="#94A3B8">PENETRATION DEPTH</text>
    <text x="15" y="36" font-family="Bricolage Grotesque, sans-serif" font-size="18" font-weight="800" fill="#7C3AED">1-3 cm</text>
  </g>

  <!-- Key principle box -->
  <g transform="translate(20, 285)">
    <rect x="0" y="0" width="200" height="50" rx="10" fill="white" stroke="#DDD6FE" stroke-width="1.5"/>
    <text x="15" y="18" font-family="Plus Jakarta Sans, sans-serif" font-size="8" font-weight="700" fill="#7C3AED">HOW IT FOCUSES</text>
    <text x="15" y="32" font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#64748B">The figure-8 shape creates a</text>
    <text x="15" y="44" font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#64748B">focused field at the intersection</text>
  </g>
</svg>
