<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4F1EA"/>
      <stop offset="100%" stop-color="#D4806A"/>
    </linearGradient>
    <linearGradient id="skullGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F4F1EA"/>
      <stop offset="100%" stop-color="#E6EAF0"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F4F1EA"/>
      <stop offset="100%" stop-color="#F4F1EA"/>
    </linearGradient>
    <radialGradient id="activationGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A1628" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>
    <style>
      @keyframes fieldPulse { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.5; } }
      @keyframes neuronFire { 0%, 100% { opacity: 0.2; r: 3; } 50% { opacity: 1; r: 5; } }
      .field-pulse { animation: fieldPulse 2s ease-in-out infinite; }
      .field-pulse-2 { animation: fieldPulse 2s ease-in-out infinite 0.5s; }
      .field-pulse-3 { animation: fieldPulse 2s ease-in-out infinite 1s; }
      .neuron-fire { animation: neuronFire 1.5s ease-in-out infinite; }
      .neuron-fire-2 { animation: neuronFire 1.5s ease-in-out infinite 0.4s; }
      .neuron-fire-3 { animation: neuronFire 1.5s ease-in-out infinite 0.8s; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#FBFAF7"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-family="Bricolage Grotesque, sans-serif" font-size="22" font-weight="700" fill="#0A1628">How Transcranial Magnetic Stimulation Works</text>
  <text x="400" y="68" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="13" fill="#5A6B82">Cross-sectional view of the electromagnetic field penetrating the cortex</text>

  <!-- ============================================ -->
  <!-- CROSS-SECTION DIAGRAM (center) -->
  <!-- ============================================ -->

  <!-- Scalp layer -->
  <path d="M150 200 C150 140 250 90 400 90 C550 90 650 140 650 200 L650 220 C650 160 550 110 400 110 C250 110 150 160 150 220Z"
    fill="url(#skinGrad)" stroke="#C9654A" stroke-width="1.5"/>
  <text x="690" y="155" font-family="Plus Jakarta Sans, sans-serif" font-size="11" font-weight="600" fill="#5A6B82">SCALP</text>

  <!-- Skull layer -->
  <path d="M150 220 C150 160 250 110 400 110 C550 110 650 160 650 220 L650 250 C650 190 550 140 400 140 C250 140 150 190 150 250Z"
    fill="url(#skullGrad)" stroke="#5A6B82" stroke-width="1.5"/>
  <text x="690" y="190" font-family="Plus Jakarta Sans, sans-serif" font-size="11" font-weight="600" fill="#5A6B82">SKULL</text>

  <!-- Cerebral cortex (brain tissue) -->
  <path d="M150 250 C150 190 250 140 400 140 C550 140 650 190 650 250 L650 420 C650 440 550 460 400 460 C250 460 150 440 150 420Z"
    fill="url(#brainGrad)" stroke="#D4806A" stroke-width="1.5"/>
  <text x="690" y="250" font-family="Plus Jakarta Sans, sans-serif" font-size="11" font-weight="600" fill="#5A6B82">CORTEX</text>

  <!-- Brain fold lines (gyri/sulci) -->
  <g stroke="#D4806A" stroke-width="1.2" fill="none" opacity="0.5">
    <path d="M200 280 C260 270 300 285 350 275 C400 265 440 278 500 270 C540 264 580 275 620 280"/>
    <path d="M210 320 C270 312 310 325 360 316 C410 308 450 320 510 312 C555 306 590 318 630 322"/>
    <path d="M220 360 C280 352 320 365 370 356 C420 348 460 360 520 352 C560 346 595 358 635 362"/>
    <path d="M230 395 C280 390 320 400 370 393 C420 386 460 398 520 390"/>
  </g>

  <!-- ============================================ -->
  <!-- FIGURE-8 COIL (on top of scalp) -->
  <!-- ============================================ -->
  <g transform="translate(400, 85)">
    <!-- Coil housing - figure 8 shape -->
    <ellipse cx="-42" cy="-30" rx="45" ry="30" fill="#FBFAF7" stroke="#5A6B82" stroke-width="2"/>
    <ellipse cx="42" cy="-30" rx="45" ry="30" fill="#FBFAF7" stroke="#5A6B82" stroke-width="2"/>

    <!-- Center junction of figure-8 -->
    <rect x="-15" y="-50" width="30" height="40" rx="6" fill="#E6EAF0" stroke="#5A6B82" stroke-width="1.5"/>

    <!-- Coil winding visualization -->
    <ellipse cx="-42" cy="-30" rx="32" ry="20" fill="none" stroke="#0A1628" stroke-width="2" opacity="0.35"/>
    <ellipse cx="-42" cy="-30" rx="24" ry="14" fill="none" stroke="#0A1628" stroke-width="1.5" opacity="0.25"/>
    <ellipse cx="42" cy="-30" rx="32" ry="20" fill="none" stroke="#0A1628" stroke-width="2" opacity="0.35"/>
    <ellipse cx="42" cy="-30" rx="24" ry="14" fill="none" stroke="#0A1628" stroke-width="1.5" opacity="0.25"/>

    <!-- Current direction arrows on coils -->
    <g fill="#0A1628" opacity="0.5">
      <!-- Left coil - counterclockwise -->
      <polygon points="-72,-20 -68,-26 -64,-20" transform="rotate(-30 -68 -23)"/>
      <polygon points="-12,-20 -16,-26 -20,-20" transform="rotate(30 -16 -23)"/>
      <!-- Right coil - clockwise -->
      <polygon points="12,-20 16,-26 20,-20" transform="rotate(-30 16 -23)"/>
      <polygon points="72,-20 68,-26 64,-20" transform="rotate(30 68 -23)"/>
    </g>

    <!-- Handle -->
    <rect x="-8" y="-85" width="16" height="40" rx="5" fill="#E6EAF0" stroke="#5A6B82" stroke-width="1.5"/>
    <!-- Cable -->
    <path d="M0,-85 C0,-100 -15,-110 -30,-115 C-50,-122 -65,-115 -75,-105" stroke="#5A6B82" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- Active indicator -->
    <circle cx="0" cy="-30" r="5" fill="#0A1628" opacity="0.9"/>
    <circle cx="0" cy="-30" r="3" fill="#C9654A"/>

    <!-- Label -->
    <text x="0" y="-95" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="12" font-weight="700" fill="#0A1628">FIGURE-8 COIL</text>
  </g>

  <!-- ============================================ -->
  <!-- MAGNETIC FIELD LINES -->
  <!-- ============================================ -->
  <!-- Field lines going DOWN from coil into brain (the therapeutic effect) -->
  <g opacity="0.6">
    <!-- Central focused field (where the two coils meet = strongest) -->
    <path d="M400 100 L400 300" stroke="#0A1628" stroke-width="2.5" stroke-dasharray="6 4" class="field-pulse"/>
    <path d="M385 105 C385 150 380 200 375 280" stroke="#1E2A3B" stroke-width="1.8" stroke-dasharray="5 4" class="field-pulse-2"/>
    <path d="M415 105 C415 150 420 200 425 280" stroke="#1E2A3B" stroke-width="1.8" stroke-dasharray="5 4" class="field-pulse-2"/>
    <path d="M370 110 C365 160 355 220 350 270" stroke="#C9654A" stroke-width="1.2" stroke-dasharray="4 4" class="field-pulse-3"/>
    <path d="M430 110 C435 160 445 220 450 270" stroke="#C9654A" stroke-width="1.2" stroke-dasharray="4 4" class="field-pulse-3"/>

    <!-- Arrow tips at the bottom of field lines -->
    <polygon points="400,300 395,288 405,288" fill="#0A1628" opacity="0.6"/>
    <polygon points="375,280 370,268 380,268" fill="#1E2A3B" opacity="0.4"/>
    <polygon points="425,280 420,268 430,268" fill="#1E2A3B" opacity="0.4"/>
  </g>

  <!-- Activation zone in cortex -->
  <ellipse cx="400" cy="290" rx="60" ry="40" fill="url(#activationGlow)"/>

  <!-- ============================================ -->
  <!-- NEURONS firing in activation zone -->
  <!-- ============================================ -->
  <g transform="translate(400, 290)">
    <!-- Neuron cell bodies -->
    <circle cx="0" cy="0" r="4" fill="#0A1628" class="neuron-fire"/>
    <circle cx="-25" cy="15" r="3" fill="#1E2A3B" class="neuron-fire-2"/>
    <circle cx="20" cy="-10" r="3.5" fill="#0A1628" class="neuron-fire-3"/>
    <circle cx="-15" cy="-20" r="3" fill="#C9654A" class="neuron-fire"/>
    <circle cx="30" cy="10" r="3" fill="#1E2A3B" class="neuron-fire-2"/>
    <circle cx="10" cy="25" r="3" fill="#0A1628" class="neuron-fire-3"/>
    <circle cx="-35" cy="-5" r="2.5" fill="#C9654A" class="neuron-fire"/>
    <circle cx="40" cy="-5" r="2.5" fill="#C9654A" class="neuron-fire-2"/>

    <!-- Dendrites / axon connections -->
    <g stroke="#0A1628" stroke-width="0.8" opacity="0.4">
      <line x1="0" y1="0" x2="-25" y2="15"/>
      <line x1="0" y1="0" x2="20" y2="-10"/>
      <line x1="0" y1="0" x2="-15" y2="-20"/>
      <line x1="0" y1="0" x2="10" y2="25"/>
      <line x1="-25" y1="15" x2="-35" y2="-5"/>
      <line x1="20" y1="-10" x2="30" y2="10"/>
      <line x1="30" y1="10" x2="40" y2="-5"/>
      <line x1="-15" y1="-20" x2="-35" y2="-5"/>
      <line x1="20" y1="-10" x2="40" y2="-5"/>
      <line x1="-25" y1="15" x2="10" y2="25"/>
    </g>
  </g>

  <!-- ============================================ -->
  <!-- STEP LABELS (bottom) -->
  <!-- ============================================ -->

  <!-- Step 1 -->
  <g transform="translate(100, 500)">
    <rect x="0" y="0" width="180" height="80" rx="12" fill="white" stroke="#E6EAF0" stroke-width="1.5"/>
    <circle cx="22" cy="22" r="14" fill="#0A1628"/>
    <text x="22" y="27" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="12" font-weight="700" fill="white">1</text>
    <text x="45" y="27" font-family="Plus Jakarta Sans, sans-serif" font-size="12" font-weight="700" fill="#0A1628">Magnetic Pulse</text>
    <text x="22" y="48" font-family="Plus Jakarta Sans, sans-serif" font-size="11" fill="#5A6B82">Coil generates a brief,</text>
    <text x="22" y="63" font-family="Plus Jakarta Sans, sans-serif" font-size="11" fill="#5A6B82">focused magnetic field</text>
  </g>

  <!-- Arrow -->
  <path d="M290 540 L310 540" stroke="#E6EAF0" stroke-width="2" marker-end="url(#arrowEnd)"/>

  <!-- Step 2 -->
  <g transform="translate(315, 500)">
    <rect x="0" y="0" width="180" height="80" rx="12" fill="white" stroke="#E6EAF0" stroke-width="1.5"/>
    <circle cx="22" cy="22" r="14" fill="#0A1628"/>
    <text x="22" y="27" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="12" font-weight="700" fill="white">2</text>
    <text x="45" y="27" font-family="Plus Jakarta Sans, sans-serif" font-size="12" font-weight="700" fill="#0A1628">Penetrates Skull</text>
    <text x="22" y="48" font-family="Plus Jakarta Sans, sans-serif" font-size="11" fill="#5A6B82">Field passes painlessly</text>
    <text x="22" y="63" font-family="Plus Jakarta Sans, sans-serif" font-size="11" fill="#5A6B82">through scalp and bone</text>
  </g>

  <!-- Arrow -->
  <path d="M505 540 L525 540" stroke="#E6EAF0" stroke-width="2"/>

  <!-- Step 3 -->
  <g transform="translate(530, 500)">
    <rect x="0" y="0" width="180" height="80" rx="12" fill="white" stroke="#E6EAF0" stroke-width="1.5"/>
    <circle cx="22" cy="22" r="14" fill="#0A1628"/>
    <text x="22" y="27" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="12" font-weight="700" fill="white">3</text>
    <text x="45" y="27" font-family="Plus Jakarta Sans, sans-serif" font-size="12" font-weight="700" fill="#0A1628">Neurons Activate</text>
    <text x="22" y="48" font-family="Plus Jakarta Sans, sans-serif" font-size="11" fill="#5A6B82">Electrical currents stimulate</text>
    <text x="22" y="63" font-family="Plus Jakarta Sans, sans-serif" font-size="11" fill="#5A6B82">nerve cells in the cortex</text>
  </g>

  <!-- Layer depth markers on the right -->
  <g transform="translate(670, 100)">
    <line x1="0" y1="0" x2="0" y2="130" stroke="#E6EAF0" stroke-width="1"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#E6EAF0" stroke-width="1.5"/>
    <line x1="-5" y1="20" x2="5" y2="20" stroke="#E6EAF0" stroke-width="1.5"/>
    <line x1="-5" y1="50" x2="5" y2="50" stroke="#E6EAF0" stroke-width="1.5"/>
    <line x1="-5" y1="130" x2="5" y2="130" stroke="#E6EAF0" stroke-width="1.5"/>
    <text x="15" y="15" font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#5A6B82">~5mm</text>
    <text x="15" y="40" font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#5A6B82">~7mm</text>
    <text x="15" y="95" font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#5A6B82">1-3 cm</text>
    <text x="15" y="95" font-family="Plus Jakarta Sans, sans-serif" font-size="8" fill="#5A6B82" dy="12">penetration</text>
  </g>
</svg>
